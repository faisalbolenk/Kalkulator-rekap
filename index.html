<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Rekap Pati 5</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f2f5; padding: 10px; }
        .date-badge { background: #007bff; color: white; text-align: center; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-weight: bold; font-size: 0.95em; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card { background: white; padding: 15px; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h3 { margin-top: 0; color: #007bff; border-bottom: 2px solid #eee; padding-bottom: 5px; font-size: 1.1em; display: flex; justify-content: space-between; align-items: center; }
        .auto-save-status { font-size: 0.65em; color: #28a745; font-weight: normal; }
        label { display: block; font-size: 0.8em; font-weight: bold; margin-top: 8px; color: #555; }
        input { width: 100%; padding: 8px; margin-top: 4px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; text-align: center; }
        .res-box { padding: 8px; margin-top: 8px; border-radius: 8px; background: #e7f3ff; border-left: 4px solid #28a745; font-size: 0.85em; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.8em; }
        th, td { border: 1px solid #eee; padding: 8px; text-align: center; }
        th { background: #f8f9fa; color: #333; }
        .hasil-cell { background: #fdfdfd; font-size: 0.9em; line-height: 1.4; color: #333; }
        .label-cell { font-weight: bold; color: #555; text-align: left; }
        
        .btn-container { display: flex; justify-content: center; margin-top: 15px; }
        .btn-hapus { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; font-size: 0.9em; cursor: pointer; color: white; background: #dc3545; }
    </style>
</head>
<body>

    <div class="date-badge" id="tanggal-hari-ini">Memuat tanggal...</div>

    <div class="card">
        <h3>
            <span>1. Kalkulator Rekap</span>
            <span class="auto-save-status">✅ Auto-Save Aktif</span>
        </h3>
        <label>Drop:</label>
        <input type="number" id="d1" oninput="hitung()" placeholder="Isi Drop">
        <label>Jml Drop lalu:</label>
        <input type="number" id="d2" oninput="hitung()" placeholder="Isi Jml Drop lalu">
        <div class="res-box" id="hDrop">Jml Drop : 0</div>

        <label>Storting:</label>
        <input type="number" id="s1" oninput="hitung()" placeholder="Isi Storting">
        <label>Jml Storting lalu:</label>
        <input type="number" id="s2" oninput="hitung()" placeholder="Isi Jml Storting lalu">
        <div class="res-box" id="hStort">Jml Storting : 0</div>

        <label>Sirkulasi (Drop*1.3 - Stort + Sirk):</label>
        <input type="number" id="drRec" oninput="hitung()" placeholder="Drop (otomatis)">
        <input type="number" id="stRec" oninput="hitung()" placeholder="Stort (otomatis)">
        <input type="number" id="siRec" oninput="hitung()" placeholder="Isi Sirkulasi lalu">
        <div class="res-box" id="hSirkulasi">Saldo Sirkulasi : 0</div>
    </div>

    <div class="card">
        <h3>2. Kalkulator CM, MB, ML</h3>
        <table>
            <tr><th>Data</th><th>CM</th><th>MB</th><th>ML</th></tr>
            <tr><td class="label-cell">Angsuran</td>
                <td><input type="number" id="a1" oninput="hitung()"></td>
                <td><input type="number" id="a2" oninput="hitung()"></td>
                <td><input type="number" id="a3" oninput="hitung()"></td>
            </tr>
            <tr><td class="label-cell">Jmlh lalu</td>
                <td><input type="number" id="j1" oninput="hitung()"></td>
                <td><input type="number" id="j2" oninput="hitung()"></td>
                <td><input type="number" id="j3" oninput="hitung()"></td>
            </tr>
            <tr><td class="label-cell">Sldo lalu</td>
                <td><input type="number" id="sa1" oninput="hitung()"></td>
                <td><input type="number" id="sa2" oninput="hitung()"></td>
                <td><input type="number" id="sa3" oninput="hitung()"></td>
            </tr>
            <tr><td class="label-cell">Program</td>
                <td><input type="number" id="p1" oninput="hitung()"></td>
                <td><input type="number" id="p2" oninput="hitung()"></td>
                <td>-</td>
            </tr>
            <tr><td class="label-cell"><b>Hasil</b></td>
                <td class="hasil-cell" id="res1">-</td>
                <td class="hasil-cell" id="res2">-</td>
                <td class="hasil-cell" id="res3">-</td>
            </tr>
        </table>
        
        <div class="btn-container">
            <button class="btn-hapus" onclick="hapusData()">🗑️ Hapus Semua Data</button>
        </div>
    </div>

    <script>
        const inputIds = ['d1', 'd2', 's1', 's2', 'siRec', 'a1', 'a2', 'a3', 'j1', 'j2', 'j3', 'sa1', 'sa2', 'sa3', 'p1', 'p2'];

        function tampilkanTanggal() {
            const opsi = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const tanggal = new Date().toLocaleDateString('id-ID', opsi);
            document.getElementById('tanggal-hari-ini').innerText = tanggal;
        }

        function hitung() {
            document.getElementById('drRec').value = document.getElementById('d1').value;
            document.getElementById('stRec').value = document.getElementById('s1').value;

            let d1 = parseFloat(document.getElementById('d1').value) || 0;
            let d2 = parseFloat(document.getElementById('d2').value) || 0;
            document.getElementById('hDrop').innerText = "Jml Drop : " + (d1 + d2).toLocaleString('id-ID');

            let s1 = parseFloat(document.getElementById('s1').value) || 0;
            let s2 = parseFloat(document.getElementById('s2').value) || 0;
            document.getElementById('hStort').innerText = "Jml Storting : " + (s1 + s2).toLocaleString('id-ID');

            let dr = parseFloat(document.getElementById('drRec').value) || 0;
            let st = parseFloat(document.getElementById('stRec').value) || 0;
            let si = parseFloat(document.getElementById('siRec').value) || 0;
            let sirk = (dr * 1.3) - st + si;
            document.getElementById('hSirkulasi').innerText = "Saldo Sirkulasi : " + sirk.toLocaleString('id-ID');

            for(let i=1; i<=3; i++) {
                let a = parseFloat(document.getElementById('a'+i).value) || 0;
                let j = parseFloat(document.getElementById('j'+i).value) || 0;
                let sa = parseFloat(document.getElementById('sa'+i).value) || 0;
                let p = parseFloat(document.getElementById('p'+(i==3?1:i)).value) || 1;
                
                let hasil = a + j;
                let sisa = sa - a;
                let persentase = (i == 3) ? "" : ("<br><b>" + (sisa / p).toFixed(2) + "%</b>");
                
                document.getElementById('res'+i).innerHTML = `Jml: ${hasil.toLocaleString('id-ID')}<br>Sld: ${sisa.toLocaleString('id-ID')}${persentase}`;
            }

            // AUTO-SAVE SETIAP KALI ANGKA BERUBAH
            simpanData(false);
        }

        function simpanData(tampilkanPesan = true) {
            let dataObj = {};
            inputIds.forEach(id => {
                if(document.getElementById(id)) {
                    dataObj[id] = document.getElementById(id).value;
                }
            });
            
            let todayStr = new Date().toLocaleDateString('en-CA');
            let finalData = { lastDate: todayStr, values: dataObj };
            
            localStorage.setItem('kalkulatorPati5', JSON.stringify(finalData));
            if(tampilkanPesan) alert("✅ Data berhasil disimpan!");
        }

        function muatData() {
            let savedData = localStorage.getItem('kalkulatorPati5');
            tampilkanTanggal();

            if(savedData) {
                let parsed = JSON.parse(savedData);
                let todayStr = new Date().toLocaleDateString('en-CA');
                
                let dataObj = parsed.values ? parsed.values : parsed;
                let lastDate = parsed.lastDate || todayStr;

                // LOGIKA PINDAH BUKU (ROLLOVER) JAM 12 MALAM
                if (lastDate !== todayStr) {
                    // 1. Rekap Drop, Storting, Sirkulasi
                    let old_d1 = parseFloat(dataObj['d1']) || 0;
                    let old_d2 = parseFloat(dataObj['d2']) || 0;
                    let old_s1 = parseFloat(dataObj['s1']) || 0;
                    let old_s2 = parseFloat(dataObj['s2']) || 0;
                    let old_drRec = parseFloat(dataObj['drRec']) || 0;
                    let old_stRec = parseFloat(dataObj['stRec']) || 0;
                    let old_siRec = parseFloat(dataObj['siRec']) || 0;

                    let totalDropKemarin = old_d1 + old_d2;
                    let totalStortKemarin = old_s1 + old_s2;
                    let totalSirkKemarin = (old_drRec * 1.3) - old_stRec + old_siRec;

                    dataObj['d2'] = totalDropKemarin !== 0 ? totalDropKemarin : '';
                    dataObj['s2'] = totalStortKemarin !== 0 ? totalStortKemarin : '';
                    dataObj['siRec'] = totalSirkKemarin !== 0 ? totalSirkKemarin : '';

                    dataObj['d1'] = '';
                    dataObj['s1'] = '';
                    dataObj['drRec'] = '';
                    dataObj['stRec'] = '';

                    // 2. Rekap CM, MB, ML (Hasil kemarin jadi lalu hari ini)
                    for(let i=1; i<=3; i++) {
                        let old_a = parseFloat(dataObj['a'+i]) || 0;
                        let old_j = parseFloat(dataObj['j'+i]) || 0;
                        let old_sa = parseFloat(dataObj['sa'+i]) || 0;
                        
                        let totalJmlKemarin = old_a + old_j;
                        let sisaSaldoKemarin = old_sa - old_a;
                        
                        // Masukkan ke kolom "lalu"
                        dataObj['j'+i] = totalJmlKemarin !== 0 ? totalJmlKemarin : '';
                        dataObj['sa'+i] = sisaSaldoKemarin !== 0 ? sisaSaldoKemarin : '';
                        
                        // Kosongkan angsuran hari ini (karena baru mau ditagih)
                        dataObj['a'+i] = '';
                        // Program (p1, p2) tetap dibiarkan ada, tidak dihapus
                    }

                    alert("🌅 Hari baru! Semua data hasil kemarin otomatis dipindah ke kolom 'lalu'.");
                }

                // Masukkan data ke UI
                inputIds.forEach(id => {
                    if(document.getElementById(id) && dataObj[id] !== undefined) {
                        document.getElementById(id).value = dataObj[id];
                    }
                });
                
                hitung();
            }
        }

        function hapusData() {
            let konfirmasi = confirm("⚠️ Yakin ingin menghapus semua data secara permanen?");
            if(konfirmasi) {
                localStorage.removeItem('kalkulatorPati5');
                inputIds.forEach(id => {
                    if(document.getElementById(id)) {
                        document.getElementById(id).value = '';
                    }
                });
                hitung(); 
                alert("🗑️ Seluruh data telah dikosongkan.");
            }
        }

        window.onload = muatData;
    </script>
</body>
</html>
